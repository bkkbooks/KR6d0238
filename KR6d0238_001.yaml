body:
  text: 宋達磨山沙門義銛述空蕩假立中絶對此乃天然體上名俱破俱立俱法界此乃天然名下體體不二故體常融名非濫故名常定空彰蕩德三俱破三千三諦是相如假彰建德三俱立三千三諦如是相中彰妙德俱法界三千三諦相如是界蹄十如三世界事理因果依正盡三周正體不出此只在平常一念中終窮究畢光極談甚深境界不思議以此為境曰妙境三千三諦非他物以此為觀曰妙觀三千三諦皆本無境即觀故能所忘是故初乘不名觀境觀難思何所用只要剎那虗妄融妄心融處真亦亡一牧了事隨緣漢善惡都不思量著任運惡滅而成善無用心處願行增一超直入如來地揑不成團劈不開看來看去只成呆若能親到呆田地三觀元來是禍胎元享釋書十三年戒泉涌寺俊芿傳曰山陰義銛述不可剎那無此君贈芿銛號朴翁內外兼明禪教并通可謂會稽名士葛天民字無懷者也睿山沙門秀雲不可剎那無此君纂注曰華嚴疏曰般若能成萬行何法而不用之寂照盡於理極不得一行無此君耳所以開即萬行森然泯則一不為一得意即無所不通耳鈔曰言一得一行無此君者借外典語晉書中説王獻之好竹到處即皆樹之人問其故答曰人生不得一日無此君耳意在虗心貞節歲寒不移今明萬行不得暫時而無般若雲按清涼云王獻之誤也蓋徽之之事也徽之義之子而獻之兄也晉書列傳第五十曰王徽之字子猷嘗寄居空居中便令種竹或問其故徽之但嘯詠指竹曰何可一日無此君耶本按瀛奎律髓夏日載葛無懷詩曰僧義銛字朴翁以事還俗葛其姓無懷號也今録律髓所載朴翁詩七首于此郊原避暑曰有暑猶當避無憂可得忘竹疏身共瘦湖近意先涼靜勝寧須奕幽朗不待觴還同殘夢樂炙背負朝陽夏日曰曉荷承墜露晚岫障斜陽樹下地常蔭水邊風景涼蟬移驚鵲近鷺超得魚忙獨坐觀群動間消夏日長湖提晚步曰照影憐寒水關情奈夕陽雪慳天欠冷年近曰添長好句誰相寄浮生各自忙有身聊頓放無事可思量訪端叔提幹曰水趁潮頭行山隨柁尾行大江中夜滿雙櫓半空鳴雁冷來無幾鷗清睡不成平生師友地此夕最關情雪夜曰冷蘃通幽信孤山欠幾遭杯因寒更滿句到淡方高雪滴晴簷雨松翻夜壑濤布衾雖仍鐵猶念早趨朝宿裴菴曰一徑松杉回成陰見日稀山晴僧盡出風暖燕交飛結子華拋樹欄人犬護扉間看山月上清坐更添衣小亭曰小亭終日對幽叢兀坐無言似定中蒼鮮靜連湘竹紫緑陰深映蜀葵紅貓來戲捉穿華蝶下偷銜卷葉蟲斜照尚多高柳少明年更欲種梧桐
